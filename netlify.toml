[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Disabilita TUTTO il secrets scanning
  # VITE_CLERK_PUBLISHABLE_KEY è una chiave PUBBLICA di Clerk, progettata per il client
  # GEMINI_API_KEY è gestita server-side via Netlify Functions
  SECRETS_SCAN_ENABLED = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

