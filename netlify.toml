[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Disabilita il secrets scanning - VITE_CLERK_PUBLISHABLE_KEY è una chiave PUBBLICA
  # progettata per essere esposta nel client. GEMINI_API_KEY è gestita server-side.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

